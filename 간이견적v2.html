<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청암홈윈도우 — 간이 견적</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --red: #D22727;
  --red-light: #f9e9e9;
  --red-dark: #a81e1e;
  --text: #333333;
  --text-muted: #888;
  --border: #eaeaea;
  --bg: #f7f7f5;
  --white: #ffffff;
  --bubble-bot: #ffffff;
  --bubble-user: #D22727;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
  --radius: 18px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
#header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
  z-index: 10;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo .dot {
  width: 28px; height: 28px;
  background: var(--red);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.header-logo .dot svg { fill: white; width: 16px; height: 16px; }
.header-title { font-size: 15px; font-weight: 700; color: var(--text); }
.header-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
#btn-admin {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--white);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); transition: all .2s;
}
#btn-admin:hover { border-color: var(--red); color: var(--red); }

/* ── MAIN LAYOUT ── */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* ── CHAT AREA ── */
#chat-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 8px;
  scroll-behavior: smooth;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── BUBBLES ── */
.msg-row {
  display: flex;
  margin-bottom: 14px;
  animation: fadeUp .3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-row.bot { align-items: flex-start; }
.msg-row.user { justify-content: flex-end; }

.bot-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--red); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; margin-right: 8px; margin-top: 2px;
  color: white; font-weight: 700;
}
.bubble {
  max-width: 82%;
  padding: 12px 16px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  word-break: keep-all;
}
.bot .bubble {
  background: var(--bubble-bot);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
  box-shadow: var(--shadow);
}
.user .bubble {
  background: var(--bubble-user);
  color: white;
  border-top-right-radius: 4px;
}

/* ── CHOICES ── */
.choices {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 4px 0 8px 40px;
  animation: fadeUp .3s ease;
}
.choice-btn {
  padding: 9px 18px;
  border-radius: 22px;
  border: 1.5px solid var(--red);
  background: var(--white);
  color: var(--red);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
  font-family: inherit;
}
.choice-btn:hover { background: var(--red); color: white; transform: translateY(-1px); }
.choice-btn.selected { background: var(--red); color: white; }
.choice-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── INPUT ROW ── */
#input-area {
  padding: 12px 16px;
  background: var(--white);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
#text-input {
  flex: 1;
  padding: 11px 16px;
  border: 1.5px solid var(--border);
  border-radius: 24px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
  background: var(--bg);
}
#text-input:focus { border-color: var(--red); background: white; }
#text-input::placeholder { color: #bbb; }
#btn-send {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--red); border: none;
  color: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, transform .15s;
  flex-shrink: 0;
}
#btn-send:hover { background: var(--red-dark); transform: scale(1.05); }
#btn-send svg { width: 18px; height: 18px; fill: white; }

/* qty control */
.qty-control {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg); border-radius: 24px;
  padding: 6px 12px; border: 1.5px solid var(--border);
}
.qty-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1.5px solid var(--red);
  background: white; color: var(--red);
  font-size: 18px; font-weight: 300; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; line-height: 1;
}
.qty-btn:hover { background: var(--red); color: white; }
.qty-num { font-size: 18px; font-weight: 700; min-width: 28px; text-align: center; }
#btn-qty-ok {
  padding: 11px 22px; border-radius: 24px;
  background: var(--red); border: none; color: white;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background .2s;
}
#btn-qty-ok:hover { background: var(--red-dark); }

/* ── SIDE PANEL ── */
#side-panel {
  width: 300px;
  flex-shrink: 0;
  border-left: 1px solid var(--border);
  background: var(--white);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-header .dot-red {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); display: inline-block;
}
.panel-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
.panel-body::-webkit-scrollbar { width: 3px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); }

.win-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.7;
  position: relative;
  animation: fadeUp .25s ease;
}
.win-item .win-num {
  font-weight: 700; color: var(--red);
  font-size: 11px; margin-bottom: 3px;
}
.win-item .win-detail { color: var(--text-muted); }

.panel-totals {
  border-top: 1px solid var(--border);
  padding: 14px 18px;
  flex-shrink: 0;
}
.brand-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px dashed var(--border);
}
.brand-row:last-child { border-bottom: none; }
.brand-name { font-weight: 600; color: var(--text-muted); font-size: 12px; }
.brand-amt {
  font-weight: 700;
  color: var(--text);
  font-size: 14px;
}
.japy-badge {
  display: inline-block;
  background: var(--red-light);
  color: var(--red);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 10px;
}
.min-cost-note {
  font-size: 11px;
  color: var(--red);
  background: var(--red-light);
  border-radius: 6px;
  padding: 4px 8px;
  margin-bottom: 8px;
}

/* ── RESULT SCREEN ── */
#result-screen {
  display: none;
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  flex-direction: column;
  gap: 20px;
}
#result-screen::-webkit-scrollbar { width: 4px; }
#result-screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.result-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.result-sub { font-size: 13px; color: var(--text-muted); }

.brand-card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.brand-card.best {
  border-color: var(--red);
  box-shadow: 0 4px 20px rgba(210,39,39,.15);
}
.brand-card-header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.brand-card.best .brand-card-header {
  background: var(--red);
  border-bottom-color: var(--red-dark);
}
.brand-card-name {
  font-weight: 700; font-size: 15px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.brand-card.best .brand-card-name { color: white; }
.best-badge {
  background: white; color: var(--red);
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 20px;
}
.brand-card-total {
  font-size: 20px; font-weight: 700; color: var(--text);
}
.brand-card.best .brand-card-total { color: white; }
.brand-card-body { padding: 14px 18px; }
.detail-row {
  display: flex; justify-content: space-between;
  font-size: 13px; padding: 4px 0;
  color: var(--text-muted);
}
.detail-row.total {
  font-size: 15px; font-weight: 700; color: var(--text);
  border-top: 1px solid var(--border);
  padding-top: 10px; margin-top: 6px;
}
.detail-row .vat { font-size: 11px; color: var(--text-muted); font-weight: 400; }

.warn-box {
  background: #fffbe6;
  border: 1px solid #ffe066;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 12.5px;
  line-height: 1.9;
  color: #7a6300;
}
.warn-box ol { padding-left: 16px; }
.warn-box li { margin-bottom: 2px; }

.result-actions {
  display: flex; flex-direction: column; gap: 10px;
}
.btn-consult {
  display: block;
  text-align: center;
  padding: 16px;
  background: var(--red);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border-radius: 12px;
  text-decoration: none;
  transition: background .2s, transform .15s;
  cursor: pointer;
  border: none;
  font-family: inherit;
  width: 100%;
}
.btn-consult:hover { background: var(--red-dark); transform: translateY(-1px); }
.btn-reset {
  display: block;
  text-align: center;
  padding: 13px;
  background: white;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: border-color .2s;
  font-family: inherit;
  width: 100%;
}
.btn-reset:hover { border-color: var(--text-muted); color: var(--text); }

/* ── ADMIN MODAL ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }
.modal {
  background: white;
  border-radius: 16px;
  padding: 28px 26px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  max-height: 90vh;
  overflow-y: auto;
}
.modal h2 {
  font-size: 17px; font-weight: 700; margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.modal-label { font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.modal-input {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 13px;
  font-family: inherit; outline: none;
  transition: border-color .2s; margin-bottom: 16px;
}
.modal-input:focus { border-color: var(--red); }
.upload-area {
  border: 2px dashed var(--border);
  border-radius: 10px; padding: 20px;
  text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
  margin-bottom: 16px;
  position: relative;
}
.upload-area:hover { border-color: var(--red); background: var(--red-light); }
.upload-area input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
}
.upload-icon { font-size: 28px; margin-bottom: 6px; }
.upload-text { font-size: 13px; color: var(--text-muted); }
.upload-status { font-size: 12px; color: var(--red); margin-top: 6px; font-weight: 500; }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.btn-save {
  flex: 1; padding: 11px; background: var(--red);
  color: white; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  font-family: inherit; transition: background .2s;
}
.btn-save:hover { background: var(--red-dark); }
.btn-cancel {
  flex: 1; padding: 11px; background: var(--bg);
  color: var(--text-muted); border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 14px; cursor: pointer;
  font-family: inherit; transition: all .2s;
}
.btn-cancel:hover { color: var(--text); }

/* ── MOBILE PANEL TOGGLE ── */
#panel-toggle {
  display: none;
  position: fixed; bottom: 80px; right: 16px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--red); border: none; color: white;
  font-size: 20px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(210,39,39,.4);
  z-index: 50; align-items: center; justify-content: center;
  transition: transform .2s;
}
#panel-toggle:hover { transform: scale(1.1); }

@media (max-width: 700px) {
  #side-panel {
    display: none;
    position: fixed; inset: 0; z-index: 40;
    width: 100%;
  }
  #side-panel.mobile-open { display: flex; }
  #panel-toggle { display: flex; }
  .choices { padding-left: 10px; }
}

.typing-dots {
  display: inline-flex; gap: 4px; align-items: center;
  padding: 4px 2px;
}
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border);
  animation: blink 1.2s infinite ease-in-out;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,80%,100% { transform: scale(.8); opacity: .4; }
  40% { transform: scale(1); opacity: 1; }
}

.empty-panel {
  text-align: center; padding: 30px 10px;
  color: var(--border); font-size: 13px;
}
.empty-panel .icon { font-size: 36px; margin-bottom: 8px; }

/* progress bar */
.progress-bar {
  height: 3px; background: var(--border);
  flex-shrink: 0; position: relative;
}
.progress-fill {
  height: 100%; background: var(--red);
  border-radius: 0 2px 2px 0;
  transition: width .4s ease;
}

/* win summary chips */
.win-chips {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;
}
.win-chip {
  background: var(--red-light); color: var(--red);
  border-radius: 6px; padding: 3px 10px;
  font-size: 12px; font-weight: 500;
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-logo">
    <div class="dot">
      <svg viewBox="0 0 24 24"><path d="M3 3h7v7H3zm11 0h7v7h-7zM3 14h7v7H3zm11 0h7v7h-7z"/></svg>
    </div>
    <div>
      <div class="header-title">청암홈윈도우</div>
      <div class="header-sub">간이 견적 시스템</div>
    </div>
  </div>
  <div class="header-actions">
    <button id="btn-admin" title="관리자 설정" onclick="openAdmin()">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
        <path d="M12 15.5A3.5 3.5 0 018.5 12 3.5 3.5 0 0112 8.5a3.5 3.5 0 013.5 3.5 3.5 3.5 0 01-3.5 3.5m7.43-2.92c.04-.33.07-.67.07-1.08s-.03-.74-.07-1.08l2.32-1.81c.21-.16.27-.44.13-.67l-2.2-3.81c-.13-.24-.42-.32-.65-.24l-2.74 1.1c-.57-.43-1.18-.81-1.86-1.08l-.42-2.91C14.27 3.1 14.03 3 13.79 3H10.21c-.24 0-.5.1-.55.33l-.42 2.91c-.68.27-1.3.65-1.86 1.08l-2.74-1.1c-.23-.08-.52 0-.65.24L1.79 10.27c-.14.23-.08.51.13.67l2.32 1.81C4.2 13.07 4.17 13.4 4.17 13.8s.03.74.07 1.07l-2.32 1.82c-.21.16-.27.43-.13.67l2.2 3.81c.13.24.42.32.65.24l2.74-1.1c.57.44 1.18.81 1.86 1.09l.42 2.9c.05.24.31.34.55.34h3.58c.24 0 .5-.1.55-.34l.42-2.9c.68-.28 1.29-.65 1.86-1.09l2.74 1.1c.23.08.52 0 .65-.24l2.2-3.81c.14-.24.08-.51-.13-.67l-2.32-1.82z"/>
      </svg>
    </button>
  </div>
</div>

<!-- PROGRESS BAR -->
<div class="progress-bar">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CHAT -->
  <div id="chat-wrap">
    <div id="chat-messages"></div>

    <div id="input-area">
      <!-- dynamically replaced by step logic -->
      <div class="input-row" id="text-input-row" style="display:none">
        <input id="text-input" type="text" placeholder="" inputmode="numeric">
        <button id="btn-send" onclick="handleTextSend()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
      <div id="qty-row" style="display:none">
        <div class="input-row">
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-num" id="qty-val">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
          <button id="btn-qty-ok" onclick="confirmQty()">확인</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div id="side-panel">
    <div class="panel-header">
      <span class="dot-red"></span> 실시간 견적
      <button id="panel-close" style="margin-left:auto;background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;display:none" onclick="closeMobilePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="empty-panel">
        <div class="icon">🪟</div>
        창을 입력하면<br>여기서 확인할 수 있어요
      </div>
    </div>
    <div class="panel-totals" id="panel-totals" style="display:none"></div>
  </div>

</div>

<!-- RESULT SCREEN (replaces chat-wrap content) -->
<div id="result-screen"></div>

<!-- MOBILE PANEL TOGGLE -->
<button id="panel-toggle" onclick="toggleMobilePanel()">🪟</button>

<!-- ADMIN MODAL -->
<div class="modal-backdrop" id="admin-modal">
  <div class="modal">
    <h2>⚙️ 관리자 설정</h2>

    <div class="modal-label">견적 상담 요청 URL</div>
    <input class="modal-input" id="admin-url" type="url"
      placeholder="https://your-site.com/consult" value="#">

    <div class="modal-label">단가표 엑셀 업로드</div>
    <div class="upload-area">
      <input type="file" accept=".xlsx,.xls" onchange="handleExcelUpload(event)">
      <div class="upload-icon">📊</div>
      <div class="upload-text">LX / HW / HCC 시트가 포함된<br>.xlsx 파일을 업로드하세요</div>
      <div class="upload-status" id="upload-status"></div>
    </div>
    <small style="font-size:11px;color:#aaa;display:block;margin-bottom:16px">
      ※ 시트명: LX, HW, HCC / 열: 자평, 일반단창_2W, 일반이중창_2W, 발코니단창_2W, 발코니이중창_2W

// ═══════════════════════════════════════════════
let prices = JSON.parse(JSON.stringify(DEFAULT_PRICES));
let consultUrl = '#';
let windows = [];
let currentWin = {};
let step = 0;
let currentQty = 1;
let inputMode = null; // 'width' | 'height-custom'

const BRAND_NAMES = { LX: 'LX Z:IN', HW: '홈윈도우', HCC: 'KCC 홈씨씨' };
const BRAND_ORDER = ['LX', 'HCC', 'HW'];
const MIN_COST_THRESHOLD = 130;
const MIN_COST_AMOUNT = 500000;
const INSTALL_RATE = 9000;

// ═══════════════════════════════════════════════
// PRICE LOOKUP
// ═══════════════════════════════════════════════
function getPrice(brand, isBalcony, isDouble, japy) {
  const key = (isBalcony ? '발코니' : '일반') + (isDouble ? '이중창' : '단창');
  const arr = prices[brand][key];
  if (!arr) return 0;
  const idx = Math.max(0, Math.min(Math.round(japy) - 1, arr.length - 1));
  return arr[idx];
}

function calcJapy(widthMm, heightMm) {
  return (widthMm * heightMm) / 90000;
}

function totalJapy() {
  return windows.reduce((s, w) => s + w.japy * w.qty, 0);
}

function calcBrandTotal(brand) {
  let material = 0;
  let japy = 0;
  windows.forEach(w => {
    material += getPrice(brand, w.isBalcony, w.isDouble, w.japy) * w.qty;
    japy += w.japy * w.qty;
  });
  const install = Math.round(japy) * INSTALL_RATE;
  const minCost = japy < MIN_COST_THRESHOLD ? MIN_COST_AMOUNT : 0;
  return { material, install, minCost, total: material + install + minCost, japy };
}

// ═══════════════════════════════════════════════
// CHAT ENGINE
// ═══════════════════════════════════════════════
const chatEl = document.getElementById('chat-messages');
const inputRow = document.getElementById('text-input-row');
const qtyRow = document.getElementById('qty-row');
const textInput = document.getElementById('text-input');
const progressFill = document.getElementById('progress-fill');

function scrollBot() {
  setTimeout(() => { chatEl.scrollTop = chatEl.scrollHeight; }, 80);
}

function addBotMsg(html, delay = 0) {
  return new Promise(resolve => {
    const typing = document.createElement('div');
    typing.className = 'msg-row bot';
    typing.innerHTML = `<div class="bot-avatar">청</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chatEl.appendChild(typing);
    scrollBot();
    setTimeout(() => {
      typing.querySelector('.bubble').innerHTML = html;
      scrollBot();
      resolve();
    }, delay || 600);
  });
}

function addUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble">${text}</div>`;
  chatEl.appendChild(row);
  scrollBot();
}

function showChoices(choices) {
  const wrap = document.createElement('div');
  wrap.className = 'choices';
  wrap.id = 'current-choices';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.label;
    btn.onclick = () => {
      document.querySelectorAll('#current-choices .choice-btn').forEach(b => b.disabled = true);
      btn.classList.add('selected');
      addUserMsg(c.label);
      setTimeout(() => c.action(), 300);
    };
    wrap.appendChild(btn);
  });
  chatEl.appendChild(wrap);
  scrollBot();
}

function hideInputs() {
  inputRow.style.display = 'none';
  qtyRow.style.display = 'none';
  textInput.value = '';
}

function showTextInput(placeholder, mode) {
  inputMode = mode;
  textInput.placeholder = placeholder;
  inputRow.style.display = 'flex';
  textInput.focus();
}

function showQtyInput() {
  currentQty = 1;
  document.getElementById('qty-val').textContent = 1;
  qtyRow.style.display = 'block';
}

function setProgress(pct) {
  progressFill.style.width = pct + '%';
}

// ═══════════════════════════════════════════════
// FLOW
// ═══════════════════════════════════════════════
async function startFlow() {
  step = 0; windows = []; currentWin = {};
  updatePanel();
  setProgress(5);
  await addBotMsg('안녕하세요! 👋<br>청암홈윈도우 간이 견적 서비스입니다.<br>몇 가지만 여쭤보면 <strong>3개 브랜드의 예상 견적</strong>을 바로 알려드릴게요.', 800);
  await askBuildingType();
}

  setProgress(10);
  await addBotMsg('창호 교체를 하시려는 곳이 어디인가요?', 700);
  showChoices([
    { label: '🏢 아파트', action: () => { currentWin.building = '아파트'; askWindowType(); } },
    { label: '🏠 주택', action: () => { currentWin.building = '주택'; askWindowType(); } },
    { label: '🏗️ 기타', action: () => { currentWin.building = '기타'; askWindowType(); } },
  ]);
}

  setProgress(20);

${intro}<b>이중창</b>인가요, <b>단창</b>인가요?<br>

  showChoices([
    { label: '➕ 네, 창이 더 있어요', action: () => { currentWin = { building: windows[0]?.building }; askWindowType(); } },
    { label: '✅ 아니요, 견적 보여주세요', action: () => showResult() },
  ]);
}

function handleTextSend() {
  const val = textInput.value.trim();
  if (!val) return;
  const num = parseFloat(val);
  if (isNaN(num) || num <= 0) {
    textInput.value = '';
    textInput.placeholder = '⚠️ 숫자만 입력해주세요';
    return;
  }
  hideInputs();
  if (inputMode === 'height-custom') {
    addUserMsg(num + ' mm');
    currentWin.height = num;
    askWidth();
  } else if (inputMode === 'width') {
    let widthMm;
    if (num <= 30) {
      widthMm = num * 300;
      addUserMsg(`${num}번 (${widthMm}mm)`);
    } else {
      widthMm = num;
      addUserMsg(num + ' mm');
    }
    currentWin.width = Math.round(widthMm);
    askQty();
  }
}

textInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleTextSend(); });

function changeQty(delta) {
  currentQty = Math.max(1, currentQty + delta);
  document.getElementById('qty-val').textContent = currentQty;
}

function confirmQty() {
  hideInputs();
  addUserMsg(currentQty + '개');
  currentWin.qty = currentQty;
  currentWin.japy = calcJapy(currentWin.width, currentWin.height);
  windows.push({ ...currentWin });
  updatePanel();
  askMore();
}

// ═══════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════
function updatePanel() {
  const body = document.getElementById('panel-body');
  const totals = document.getElementById('panel-totals');

  if (windows.length === 0) {
    body.innerHTML = `<div class="empty-panel"><div class="icon">🪟</div>창을 입력하면<br>여기서 확인할 수 있어요</div>`;
    totals.style.display = 'none';
    return;
  }

  let html = '';
  windows.forEach((w, i) => {
    const japy = w.japy.toFixed(2);
    html += `<div class="win-item">
      <div class="win-num">창 ${i + 1}번</div>
      <div>${w.isDouble ? '이중창' : '단창'} · ${w.isBalcony ? '베란다' : '일반'}</div>
      <div style="color:#555">${w.width.toLocaleString()} × ${w.height.toLocaleString()} mm</div>
      <div class="win-detail">${japy} 자평 × ${w.qty}개 = ${(w.japy * w.qty).toFixed(2)} 자평</div>
    </div>`;
  });
  body.innerHTML = html;

  const tj = totalJapy();
  const minCost = tj < MIN_COST_THRESHOLD ? MIN_COST_AMOUNT : 0;
  let totHtml = `<div class="japy-badge">누적 ${tj.toFixed(2)} 자평</div>`;
  if (minCost > 0) {
    totHtml += `<div class="min-cost-note">⚡ 최저시공비 적용 중 (130자평 미만)</div>`;
  }
  BRAND_ORDER.forEach(b => {
    const { total } = calcBrandTotal(b);
    const minNote = minCost > 0 ? `<span style="font-size:10px;color:var(--red);font-weight:400;display:block;text-align:right">(최저시공비 50만 원 포함)</span>` : '';
    totHtml += `<div class="brand-row" style="align-items:flex-start">
      <span class="brand-name" style="padding-top:2px">${BRAND_NAMES[b]}</span>
      <span class="brand-amt" style="text-align:right">₩${total.toLocaleString()}${minNote}</span>
    </div>`;
  });
  totHtml += `<div style="font-size:11px;color:#bbb;margin-top:6px">* VAT 별도</div>`;
  totals.innerHTML = totHtml;
  totals.style.display = 'block';
}

// ═══════════════════════════════════════════════
// RESULT
// ═══════════════════════════════════════════════
function showResult() {
  setProgress(100);
  document.getElementById('main').style.display = 'none';
  document.getElementById('panel-toggle').style.display = 'none';

  const resultEl = document.getElementById('result-screen');
  resultEl.style.display = 'flex';

  const tj = totalJapy();
  const results = BRAND_ORDER.map(b => ({ brand: b, ...calcBrandTotal(b) }));
  const minTotal = Math.min(...results.map(r => r.total));

  // window summary chips
  let chipsHtml = '<div class="win-chips">';
  windows.forEach((w, i) => {
    chipsHtml += `<span class="win-chip">${i+1}. ${w.isDouble?'이중창':'단창'} ${w.isBalcony?'베란다':'일반'} ${w.width}×${w.height}mm ×${w.qty}</span>`;
  });
  chipsHtml += '</div>';

  let cardsHtml = '';
  results.forEach(r => {
    const isBest = r.total === minTotal;
    cardsHtml += `<div class="brand-card${isBest ? ' best' : ''}">
      <div class="brand-card-header">
        <div class="brand-card-name">
          ${isBest ? '🏆 ' : ''}${BRAND_NAMES[r.brand]}
          ${isBest ? '<span class="best-badge">최저가</span>' : ''}
        </div>
        <div class="brand-card-total">₩${r.total.toLocaleString()}</div>
      </div>
      <div class="brand-card-body">
        <div class="detail-row total">
          <span>총 견적금액 <span class="vat">(VAT 별도)</span></span>
          <span>₩${r.total.toLocaleString()}</span>
        </div>
        ${r.minCost > 0 ? `<div style="font-size:11px;color:var(--red);text-align:right;margin-top:4px">최저시공비 50만 원 포함</div>` : ''}
      </div>
    </div>`;
  });

  resultEl.innerHTML = `
    <div>
      <div class="result-title">간이 견적 결과</div>
      <div class="result-sub" style="margin-bottom:14px">아래는 입력하신 창호 기준 예상 금액입니다</div>
      ${chipsHtml}
    </div>
    ${cardsHtml}
    <div class="warn-box">
      <strong>⚠️ 반드시 확인해주세요</strong>
      <ol style="margin-top:8px">
        <li>부가세(VAT 10%)는 별도이며 고객님 부담입니다.</li>
        <li>노후창 철거 및 기본 시공비는 포함되어 있으나, 장비 사용·양중비·타일 등 기타 시공비는 별도입니다.</li>
        <li>본 견적은 간이 견적으로, 실제 공사를 위해서는 전문가가 방문하여 실측 후 정확한 견적을 드려야 합니다.</li>
        <li>창 누락 또는 잘못 선택한 경우 실제 공사 금액과 차이가 날 수 있습니다.</li>
        <li>기본 사양 기준이며, 옵션 추가·고사양 변경 시 금액이 증액될 수 있습니다.</li>
      </ol>
    </div>
    <div class="result-actions">
      <button class="btn-consult" onclick="goConsult()">📞 견적 상담 요청하기</button>
      <button class="btn-reset" onclick="resetAll()">🔄 처음부터 다시하기</button>
    </div>
  `;
}

function goConsult() {
  window.open(consultUrl, '_blank');
}

function resetAll() {
  windows = []; currentWin = {}; step = 0;
  chatEl.innerHTML = '';
  document.getElementById('main').style.display = 'flex';
  document.getElementById('panel-toggle').style.display = '';
  document.getElementById('result-screen').style.display = 'none';
  updatePanel();
  startFlow();
}

function handleExcelUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.textContent = '읽는 중...';
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const required = ['LX', 'HW', 'HCC'];
      const newPrices = {};
      required.forEach(sname => {
        if (!wb.SheetNames.includes(sname)) throw new Error(`시트 "${sname}" 없음`);
        const ws = wb.Sheets[sname];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
        // header row: [자평, 일반단창_2W, 일반이중창_2W, 발코니단창_2W, 발코니이중창_2W]
        newPrices[sname] = { 일반단창: [], 일반이중창: [], 발코니단창: [], 발코니이중창: [] };
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (r[0] == null) continue;
          newPrices[sname].일반단창.push(Number(r[1]) || 0);
          newPrices[sname].일반이중창.push(Number(r[2]) || 0);
          newPrices[sname].발코니단창.push(Number(r[3]) || 0);
          newPrices[sname].발코니이중창.push(Number(r[4]) || 0);
        }
      });
      prices = newPrices;
      status.textContent = `✅ 업로드 완료 (${file.name})`;
      updatePanel();
    } catch (err) {
      status.textContent = '❌ 오류: ' + err.message;
    }
  };
  reader.readAsBinaryString(file);
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:24px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.style.opacity = '1', 10);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}
