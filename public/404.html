<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>페이지를 찾을 수 없습니다 | 청암홈윈도우</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #ffffff;
      }

      main {
        max-width: 420px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.35;
      }

      p {
        margin: 0 0 24px;
        color: #4b5563;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
        background: #d22727;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p>주소가 바뀌었거나 삭제된 페이지입니다.</p>
      <a href="/">홈으로 이동</a>
    </main>
  </body>
</html>
